services:
  streamgate-backend:
    image: ghcr.io/itsh-neumeier/streamgate-backend:latest
    env_file: ../.env
    environment:
      TVHEADEND_CONNECTOR_URL: http://streamgate-tvheadend-connector:3100
      PUBLIC_BASE_URL: ${PUBLIC_BASE_URL:-http://localhost:8088}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  streamgate-admin:
    image: ghcr.io/itsh-neumeier/streamgate-admin:latest
    restart: unless-stopped

  streamgate-tvheadend-connector:
    image: ghcr.io/itsh-neumeier/streamgate-tvheadend-connector:latest
    env_file: ../.env
    environment:
      PORT: "3100"
      STREAM_TRANSCODE_MODE: ${STREAM_TRANSCODE_MODE:-streamgate}
      TVHEADEND_HD_PROFILE: ${TVHEADEND_HD_PROFILE:-prd-matroska_h264_transcode}
      TVHEADEND_SD_PROFILE: ${TVHEADEND_SD_PROFILE:-prd-matroska_h264_transcode_sd}
      TVHEADEND_PROFILE_MIME_TYPE: ${TVHEADEND_PROFILE_MIME_TYPE:-video/x-matroska}
      TVHEADEND_HD_MIME_TYPE: ${TVHEADEND_HD_MIME_TYPE:-video/x-matroska}
      TVHEADEND_SD_MIME_TYPE: ${TVHEADEND_SD_MIME_TYPE:-video/x-matroska}
      FFMPEG_TRANSCODER: ${FFMPEG_TRANSCODER:-vaapi}
      FFMPEG_LOG_LEVEL: ${FFMPEG_LOG_LEVEL:-warning}
      VAAPI_DEVICE: ${VAAPI_DEVICE:-/dev/dri/renderD128}
      HD_VIDEO_BITRATE: ${HD_VIDEO_BITRATE:-5500k}
      HD_VIDEO_MAXRATE: ${HD_VIDEO_MAXRATE:-7000k}
      HD_VIDEO_BUFSIZE: ${HD_VIDEO_BUFSIZE:-11000k}
      SD_VIDEO_BITRATE: ${SD_VIDEO_BITRATE:-1400k}
      SD_VIDEO_MAXRATE: ${SD_VIDEO_MAXRATE:-1800k}
      SD_VIDEO_BUFSIZE: ${SD_VIDEO_BUFSIZE:-2800k}
      SD_AUDIO_BITRATE: ${SD_AUDIO_BITRATE:-128k}
    devices:
      - ${VAAPI_RENDER_DEVICE:-/dev/dri/renderD128}:/dev/dri/renderD128
    restart: unless-stopped

  streamgate-proxy:
    image: ghcr.io/itsh-neumeier/streamgate-proxy:latest
    ports:
      - "8088:8080"
    depends_on:
      - streamgate-backend
      - streamgate-tvheadend-connector
    restart: unless-stopped

  postgres:
    image: postgres:16
    env_file: ../.env
    volumes:
      - streamgate-postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-streamgate} -d ${POSTGRES_DB:-streamgate}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

volumes:
  streamgate-postgres:
