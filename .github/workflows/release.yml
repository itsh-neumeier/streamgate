name: Release Containers

on:
  push:
    tags: ["v*.*.*"]
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - image: ghcr.io/itsh-neumeier/streamgate-backend
            dockerfile: apps/backend/Dockerfile
          - image: ghcr.io/itsh-neumeier/streamgate-admin
            dockerfile: apps/admin/Dockerfile
          - image: ghcr.io/itsh-neumeier/streamgate-proxy
            dockerfile: services/proxy/Dockerfile
          - image: ghcr.io/itsh-neumeier/streamgate-tvheadend-connector
            dockerfile: services/tvheadend-connector/Dockerfile
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/metadata-action@v5
        id: meta
        with:
          images: ${{ matrix.image }}
          tags: |
            type=raw,value=latest
            type=sha,format=short
            type=semver,pattern={{version}}
      - uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
